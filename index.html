<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 Audio Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="container">
        <h1>YouTube Audio Downloader</h1>

        <div class="input-group">
            <label for="youtubeUrl">Paste Video Link Here:</label>
            <input type="url" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." aria-required="true"
                autocomplete="off">
        </div>

        <button id="downloadBtn" type="button">
            Convert to MP3
        </button>

        <div id="statusRegion" class="status-box hidden" aria-live="polite">
            <p id="statusMessage">Waiting for link...</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
